<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mesh file search</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0d0f14;
      color: #e8ecf4;
      font: 15px/1.45 system-ui, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #search-chrome {
      flex-shrink: 0;
      z-index: 800;
      padding: 0.65rem 0.9rem 0.75rem;
      background: linear-gradient(180deg, rgba(13, 15, 20, 0.98), rgba(13, 15, 20, 0.92));
      border-bottom: 1px solid #1e2430;
    }
    #search-chrome-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.65rem;
    }
    #search-chrome h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    #search-meta {
      color: #aeb6c8;
      font-size: 0.82rem;
      margin-top: 0.2rem;
    }
    #search-nav {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-shrink: 0;
    }
    #search-nav a {
      color: #9ecfff;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.65rem;
      border: 1px solid #2a3344;
      border-radius: 6px;
      background: rgba(18, 21, 28, 0.88);
      white-space: nowrap;
    }
    #search-nav a:hover {
      border-color: #3d4d66;
      background: rgba(24, 29, 38, 0.95);
    }
    #mesh-search-form {
      display: grid;
      gap: 0.55rem;
    }
    .search-query-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }
    #mesh-search-query {
      flex: 1;
      min-width: 0;
      padding: 0.55rem 0.7rem;
      font-size: 1rem;
      font-family: ui-monospace, monospace;
      color: #e8ecf4;
      background: #12151c;
      border: 1px solid #2a3344;
      border-radius: 8px;
    }
    #mesh-search-query:focus {
      outline: none;
      border-color: #d4a017;
      box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.2);
    }
    #mesh-search-form button[type="submit"] {
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #0d0f14;
      background: #d4a017;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #mesh-search-form button[type="submit"]:hover {
      background: #e0b030;
    }
    .search-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 1rem;
      align-items: center;
    }
    .search-filters label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #aeb6c8;
    }
    .search-filters select,
    .search-filters input[type="text"] {
      padding: 0.35rem 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      color: #e8ecf4;
      background: #12151c;
      border: 1px solid #2a3344;
      border-radius: 6px;
    }
    #search-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 1rem;
      align-items: center;
      margin-top: 0.55rem;
      padding-top: 0.55rem;
      border-top: 1px solid #1e2430;
    }
    #search-toolbar label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      color: #c5ccd8;
      cursor: pointer;
    }
    #mesh-search-download-selected {
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #0d0f14;
      background: #7dcea0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #mesh-search-download-selected:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #mesh-search-selection-stats {
      font-size: 0.82rem;
      color: #8b95a8;
    }
    #search-main {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0.5rem 0.9rem 3rem;
    }
    #mesh-search-results {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    #mesh-search-results thead {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #12151c;
    }
    #mesh-search-results th {
      text-align: left;
      padding: 0.5rem 0.55rem;
      color: #8b95a8;
      font-weight: 600;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #2a3344;
    }
    #mesh-search-results td {
      padding: 0.55rem;
      border-bottom: 1px solid #1a1f2a;
      vertical-align: middle;
    }
    #mesh-search-results tbody tr:hover {
      background: rgba(212, 160, 23, 0.06);
    }
    #mesh-search-results .mono {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      color: #aeb6c8;
      word-break: break-all;
    }
    #mesh-search-results .btn-dl {
      padding: 0.3rem 0.55rem;
      font-size: 0.8rem;
      color: #9ecfff;
      background: transparent;
      border: 1px solid #2a3344;
      border-radius: 5px;
      cursor: pointer;
    }
    #mesh-search-results .btn-dl:hover {
      border-color: #3d4d66;
      background: rgba(24, 29, 38, 0.8);
    }
    .mesh-search-col-check { width: 2.25rem; }
    #mesh-search-pager {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      padding-bottom: 0.5rem;
    }
    #mesh-search-pager button {
      padding: 0.35rem 0.65rem;
      font-size: 0.82rem;
      color: #9ecfff;
      background: rgba(18, 21, 28, 0.88);
      border: 1px solid #2a3344;
      border-radius: 6px;
      cursor: pointer;
    }
    #mesh-search-pager button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #mesh-search-page-info {
      font-size: 0.82rem;
      color: #8b95a8;
    }
    #search-status {
      position: fixed;
      left: 0.75rem;
      right: 0.75rem;
      bottom: 0.75rem;
      z-index: 800;
      max-width: 720px;
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      background: rgba(13, 15, 20, 0.92);
      color: #aeb6c8;
      font-size: 0.82rem;
      border: 1px solid #1e2430;
      pointer-events: none;
    }
    #search-status:empty { display: none; }
    .muted { color: #6b7280; }
    @media (max-width: 720px) {
      #mesh-search-results .col-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
      #mesh-search-results .col-key { display: none; }
    }
  </style>
</head>
<body data-url-prefix="{{ url_prefix }}" id="mesh-search-panel">
  <header id="search-chrome">
    <div id="search-chrome-top">
      <div>
        <h1>Mesh file search</h1>
        <div id="search-meta">Search published files — download only matching chunks</div>
      </div>
      <nav id="search-nav">
        <a href="{{ url_prefix }}/network-data">Network Data</a>
        <a href="{{ url_prefix }}/">Mining dashboard</a>
      </nav>
    </div>

    <form id="mesh-search-form" role="search">
      <div class="search-query-row">
        <input type="search" id="mesh-search-query" name="q"
               placeholder="white paper, *bloodstone*.apk, *Stuff_IN_HERE*.*" autocomplete="off" autofocus>
        <button type="submit">Search</button>
      </div>
      <div class="search-filters">
        <label>
          Prefix
          <select id="mesh-search-prefix">
            <option value="">All</option>
            <option value="downloads">downloads/</option>
            <option value="assets">assets/</option>
          </select>
        </label>
        <label>
          MIME
          <input type="text" id="mesh-search-mime" placeholder="docx, zip…" autocomplete="off">
        </label>
      </div>
    </form>

    <div id="mesh-search-actions" hidden>
      <label>
        <input type="checkbox" id="mesh-search-select-all">
        Select page
      </label>
      <button type="button" id="mesh-search-download-selected" disabled>Download selected</button>
      <span id="mesh-search-selection-stats"></span>
    </div>
  </header>

  <main id="search-main">
    <table id="mesh-search-results">
      <thead>
        <tr>
          <th class="mesh-search-col-check"></th>
          <th class="col-name">Name</th>
          <th class="col-key">Key</th>
          <th>Size</th>
          <th>Chunks</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6" class="muted">Type to search the mesh…</td></tr>
      </tbody>
    </table>
    <div id="mesh-search-pager" hidden>
      <button type="button" id="mesh-search-prev" disabled>Previous</button>
      <span id="mesh-search-page-info"></span>
      <button type="button" id="mesh-search-next" disabled>Next</button>
    </div>
  </main>

  <div id="search-status" aria-live="polite"></div>

  <script type="module">
    import { initMeshSearch } from "{{ url_for('static', filename='js/mesh-search.js') }}?v=20260704-mesh-search-fs";
    initMeshSearch();
  </script>
</body>
</html>
