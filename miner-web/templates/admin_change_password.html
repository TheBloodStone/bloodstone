{% extends "base.html" %}
{% block title %}Change admin password · Bloodstone{% endblock %}
{% block content %}
<section class="page-head">
  <h1>Change admin password</h1>
  <p class="muted">Enter your current password, then choose a new one.</p>
</section>

<section class="panel" style="max-width: 480px">
  <div class="panel-body">
    <form method="post" class="admin-form stack-form" action="{{ url_for('admin_change_password') }}">
      <label class="field">
        <span>Current password</span>
        <input type="password" name="current_password" required autofocus autocomplete="current-password">
      </label>
      <label class="field">
        <span>New password</span>
        <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
      </label>
      <label class="field">
        <span>Confirm new password</span>
        <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password">
      </label>
      <div class="btn-row">
        <button type="submit" class="btn">Update password</button>
        <a class="btn btn-ghost" href="{{ url_for('admin') }}">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
