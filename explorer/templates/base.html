<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bloodstone Explorer{% endblock %}</title>
  {% if coin_icon_url %}<link rel="icon" href="{{ coin_icon_url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ coin_icon_url }}">{% endif %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/explorer.css') }}">
</head>
<body data-url-prefix="{{ request.script_root or '' }}">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('index') }}">
        {% include "_brand_icon.html" %}
        <span class="brand-text">Bloodstone Explorer</span>
      </a>
      <nav class="nav-links">
        <a href="{{ public_root }}/">Portal</a>
        <a href="{{ url_for('index') }}">Blocks</a>
        <a href="{{ url_for('miners_page') }}">Miners</a>
        <a href="{{ url_for('names_page') }}">Names</a>
        <a href="{{ url_for('mesh_anchors_page') }}">Mesh</a>
        <a href="{{ wallet_url }}">Wallet</a>

        <a href="{{ mining_url }}">Mining</a>
        <a href="{{ faucet_url }}">Faucet</a>
      </nav>
      <form class="search-form" action="{{ url_for('search') }}" method="get">
        <input type="search" name="q" placeholder="Block / tx / address / name" aria-label="Search" required>
        <button type="submit">Search</button>
      </form>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <span>Bloodstone mainnet · Currency: STONE · P2P port 17333</span>
      <span id="live-height" class="live-stat"></span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/explorer.js') }}"></script>
</body>
</html>
