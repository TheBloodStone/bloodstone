We'll hit three files: powdata.cpp, pow.cpp, and chain.cpp. I'll also peek at validation.cpp where the rules are enforced.

Quick framing: Bloodstone inherits SpaceXpanse / Xaya triple-algo consensus. It is not a DigiByte geometric-mean clone. We have per-algorithm Dark Gravity retargeting, explicit algorithm weights in chain work, and merge-mined SHA256d blocks.

Use the Next button when you're ready for Stop 1.`,

      {
        title: "1 — The big picture",
        time: "3 min",

        script: `Bloodstone mainnet runs three proof-of-work algorithms: SHA256d, Neoscrypt, and Yespower.

Each block carries its own PoW data — difficulty lives in powdata, not the main header nBits. That's a SpaceXpanse rule.

After the multi-algo fork, each algorithm targets roughly two hundred seventy seconds between its own blocks. Combined, you get about eighty to ninety seconds between blocks of any algorithm — that's the live mainnet feel in twenty twenty-six.

The security question Blurt asked: can rented SHA256 hashrate dominate the chain? The answer is nuanced. Raw SHA256 hashrate does not map one-to-one into chain-work dominance, because we down-weight SHA256d when we accumulate nChainWork.

Let's open powdata.cpp first — that's where the weights are defined.`,
        takeaway: "Three algos · ~270s per-algo target · chain work is weighted, not raw hashrate.",
        code: `<span class="cm">/* consensus/params.h — triple-algo spacing after MULTI_ALGO fork */</span>
<span class="kw">case</span> PowAlgo::SHA256D:
<span class="kw">case</span> PowAlgo::NEOSCRYPT:
<span class="kw">case</span> PowAlgo::YESPOWER:
    <span class="kw">return</span> <span class="num">270</span>;  <span class="cm">// seconds between blocks of this algo</span>`
      },
      {
        title: "2 — Algorithm weights (powdata.cpp)",
        time: "4 min",
        files: ["powdata.cpp"],
        record: "Open powdata.cpp, scroll to powAlgoLog2Weight (~line 15). Highlight the switch cases.",
        script: `File one: powdata.cpp. Function powAlgoLog2Weight.

This is the heart of the "SHA256 doesn't dominate chain work" argument.

Each algorithm gets a log-two weight: SHA256d is six, Neoscrypt is ten, Yespower is twenty-two.

When we convert a block's difficulty into chain work, we left-shift the proof by this weight. So a Yespower block at the same nBits contributes vastly more chain work than a SHA256d block.

Intuition: we are not pretending the algorithms are equal. We explicitly encode that CPU-friendly algos carry more weight in the cumulative work score that picks the best chain.

This is consensus — not the pool's thirty-five percent cross-algo subsidy. That subsidy affects who gets paid; this affects which fork is valid.`,
        takeaway: "SHA256d weight 6 · Neoscrypt 10 · Yespower 22 — applied in GetBlockProof.",
        code: `<span class="ln">15</span> <span class="kw">int</span> powAlgoLog2Weight (<span class="kw">const</span> PowAlgo algo)
<span class="ln">17</span>   <span class="kw">switch</span> (algo)
<span class="ln">19</span>     <span class="kw">case</span> PowAlgo::SHA256D:   <span class="kw">return</span> <span class="num">6</span>;
<span class="ln">21</span>     <span class="kw">case</span> PowAlgo::NEOSCRYPT: <span class="kw">return</span> <span class="num">10</span>;
<span class="ln">23</span>     <span class="kw">case</span> PowAlgo::YESPOWER:  <span class="kw">return</span> <span class="num">22</span>;`

        title: "3 — PoW limits & SHA256d merge-mining",
        time: "5 min",
        files: ["powdata.cpp"],
        record: "Same file: powLimitForAlgo and PowData::isValid. Show SHA256d must be merge-mined (auxpow).",
        script: `Still in powdata.cpp — two more pieces.

powLimitForAlgo scales the Neoscrypt pow limit up or down per algorithm using the same weight gap. So each algo has its own difficulty ceiling consistent with those weights.

Now PowData validation. SHA256d blocks must be merge-mined — they carry an auxpow, not a standalone fake header. Neoscrypt and Yespower are standalone.

That matters for ASICs: SHA256 work can come through auxpow / merge-mining, but it still flows through this PoW data structure and still picks up the SHA256d weight of six when we compute chain work.

So rented SHA256 can find blocks, yes — but each block's contribution to nChainWork is deliberately discounted versus CPU algos.`,
        takeaway: "Per-algo pow limits · SHA256d is auxpow-only on mainnet.",
        code: `<span class="ln">39</span>  <span class="kw">const int</span> log2Diff = powAlgoLog2Weight (NEOSCRYPT) - powAlgoLog2Weight (algo);
<span class="ln">141</span> <span class="kw">case</span> PowAlgo::SHA256D:
<span class="ln">142</span>   <span class="kw">if</span> (!isMergeMined ())
<span class="ln">143</span>     <span class="kw">return</span> error (<span class="cm">"SHA256D must be merge-mined"</span>);`
      },

        title: "4 — Per-algo difficulty retarget (pow.cpp)",
        time: "5 min",
        files: ["pow.cpp", "chain.cpp"],
        record: "Open pow.cpp line 14. Then jump to chain.cpp GetLastAncestorWithAlgo (~line 126).",
        script: `File two: pow.cpp. Function GetNextWorkRequired.

The comment says it plainly: this is Dark Gravity Wave from Dash, except we only look at ancestors that share the same PoW algorithm.

First step: pindexLast equals pindexLast.GetLastAncestorWithAlgo of the algo we're retargeting. That walks back the chain until it finds a block mined with this algorithm.

So Neoscrypt difficulty retargets from Neoscrypt blocks only. Yespower from Yespower only. SHA256d from SHA256d only.

This is the per-algorithm DGW Blurt asked about. It is not a single difficulty shared across algos, and it is not DigiByte's geometric mean across all three.`,
        takeaway: "GetNextWorkRequired is scoped per PowAlgo via GetLastAncestorWithAlgo.",
        code: `<span class="ln">14</span> GetNextWorkRequired (<span class="kw">const</span> PowAlgo algo, ...)
<span class="ln">23</span> <span class="cm">/* DGW from Dash — blocks of only one algo */</span>
<span class="ln">28</span> pindexLast = pindexLast->GetLastAncestorWithAlgo (algo);

<span class="cm">/* chain.cpp */</span>
<span class="ln">126</span> CBlockIndex::GetLastAncestorWithAlgo (algo) <span class="kw">const</span>`
      },

        title: "5 — DGW loop: 24 blocks, clamped timespan",
        time: "5 min",
        files: ["pow.cpp"],
        record: "Highlight the for-loop (24 past blocks), timespan clamp /3 and *3, and return GetCompact.",
        script: `Inside GetNextWorkRequired we average the compact targets of the last twenty-four blocks of this algorithm — classic DGW.

We measure actual timespan between the newest and oldest of those twenty-four algo-matched blocks. Target timespan is twenty-four times the per-algo spacing from consensus rules — two hundred seventy seconds on mainnet today.

Then we clamp: actual timespan cannot be less than one-third of target, or more than three times target. That limits how fast difficulty can swing.

Multiply, divide, clamp to pow limit, return compact bits. Every validating node runs this on every header — if your bits don't match, you get bad-diffbits.

Independent retargeting per algo is a real mitigation: a SHA256 flood doesn't directly crush Neoscrypt difficulty.`,
        takeaway: "24-block DGW per algo · 3× clamp · enforced at acceptheader.",
        code: `<span class="ln">26</span> <span class="kw">constexpr int64_t</span> nPastBlocks = <span class="num">24</span>;
<span class="ln">61</span> nActualTimespan = pindexLast->GetBlockTime () - pindexFirst->GetBlockTime ();
<span class="ln">65</span>   = nPastBlocks * params.rules->GetTargetSpacing(algo, nextHeight);
<span class="ln">67</span> <span class="kw">if</span> (nActualTimespan < nTargetTimespan / <span class="num">3</span>) ...
<span class="ln">69</span> <span class="kw">if</span> (nActualTimespan > nTargetTimespan * <span class="num">3</span>) ...`

        title: "6 — Chain work: GetBlockProof (chain.cpp)",

Given a block index entry, we read nBits from the PoW data — that's the mining target. Standard Bitcoin-style transformation: work proportional to one over target.

Then the critical line: work left-shift equals powAlgoLog2Weight of block dot algo.

Every block's proof is scaled by the algorithm weight we saw in powdata.cpp. When blocks are linked into a chain, pindexNew nChainWork equals previous nChainWork plus GetBlockProof of this block.

So the fork with the highest nChainWork is the best chain — but nChainWork is a weighted sum across mixed-algorithm blocks, not raw SHA256 hashpower.`,
        takeaway: "nChainWork accumulates weighted proof — this is the longest-chain rule.",
        code: `<span class="ln">141</span> arith_uint256 GetBlockProof(<span class="kw">const</span> CBlockIndex& block)
<span class="ln">156</span>   arith_uint256 work = (~bnTarget / (bnTarget + <span class="num">1</span>)) + <span class="num">1</span>;

Because each algorithm has its own two-hundred-seventy-second target, the expected time between blocks of any algorithm is computed from the harmonic combination of all three spacings.

This is the same math family used in GetBlockProofEquivalentTime. Net effect on mainnet: roughly eighty to ninety seconds between successive blocks, even though each algo slot is two hundred seventy.

Mention this when explaining why era-zero issuance and halving calendars use that eighty-second planning assumption.`,

<span class="ln">829</span> <span class="kw">for</span> (algo : {SHA256D, NEOSCRYPT, YESPOWER})

      },

        time: "4 min",
        files: ["chain.cpp"],
        record: "chain.cpp GetBlockProofEquivalentTime ~line 164. Don't read every line — explain the numer/denom loop.",
        script: `Back to chain.cpp — GetBlockProofEquivalentTime.

This converts a difference in chain work into an equivalent time span, correcting for which algorithms are active and their spacings and weights.

The loop over SHA256d, Neoscrypt, and Yespower builds a numerator and denominator from each algo's target spacing and the proof of the tip's last block of that algo.

You don't need to memorize the formula. The point for Blurt: time and work math is algo-aware everywhere it matters, not single-chain Bitcoin math pasted on top.`,

<span class="ln">188</span> <span class="kw">for</span> (algo : {SHA256D, NEOSCRYPT, YESPOWER})

        script: `Enforcement lives in validation dot cpp.

ContextualCheckBlockHeader compares the block's pow bits to GetNextWorkRequired for that block's core algorithm. Mismatch returns invalid header, bad-diffbits.

Separately, when we add a header to the index, nChainWork is updated with GetBlockProof. Peers compare nChainWork to choose the best chain in net processing.

So: correct difficulty per algo, weighted work sum, longest weighted chain wins. That's the consensus story.

If a pool pays miners differently — cross-algo subsidies, seventy-five percent cap per address — that's in pool_db and stratum code, not here.`,

        script: `Wrap-up for Blurt.

What we have in consensus today: triple-algo PoW, per-algorithm Dark Gravity retargeting, explicit down-weighting of SHA256d in chain work, merge-mined SHA256 blocks, and longest weighted-work chain selection.

What we do not have: DigiByte-style geometric mean difficulty as a named layer. ROD Neoscrypt in the pool is a fourth mining lane for the auxiliary chain — not a fourth consensus weight on Bloodstone mainnet.

          <div class="script-box">
            <div class="label">Script — read this</div>
            <div class="script-text">${esc(s.script)}</div>
          </div>
          ${s.takeaway ? `<div class="takeaway"><strong>Takeaway:</strong> ${esc(s.takeaway)}</div>` : ""}
          <div class="${scriptOnly ? "hidden" : ""}">${codeBlock}</div>
          <div class="nav-row">
            <button type="button" id="nav-prev">← Previous</button>
            <button type="button" class="primary" id="nav-next">${idx < STOPS.length - 1 ? "Next →" : "Finish"}</button>
          </div>
        </article>`;

      document.getElementById("nav-prev").addEventListener("click", () => go(idx - 1));
      document.getElementById("nav-next").addEventListener("click", () => go(idx + 1));

      $fill.style.width = `${((idx + 1) / STOPS.length) * 100}%`;
      $plabel.textContent = `Stop ${idx + 1} of ${STOPS.length}`;
      renderList();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function go(i) {
      if (i < 0 || i >= STOPS.length) return;
      idx = i;
      renderStop();
    }

    function togglePresenter() {
      presenter = !presenter;
      document.body.classList.toggle("presenter", presenter);
      document.getElementById("btn-presenter").classList.toggle("active", presenter);
    }

    function toggleScriptOnly() {
      scriptOnly = !scriptOnly;
      document.getElementById("btn-script-only").classList.toggle("active", scriptOnly);
      renderStop();
    }

    document.getElementById("btn-prev").addEventListener("click", () => go(idx - 1));
    document.getElementById("btn-next").addEventListener("click", () => go(idx + 1));
    document.getElementById("btn-presenter").addEventListener("click", togglePresenter);
    document.getElementById("btn-script-only").addEventListener("click", toggleScriptOnly);

    document.addEventListener("keydown", (e) => {
      if (e.target.matches("input, textarea")) return;
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); go(idx + 1); }
      if (e.key === "ArrowLeft") { e.preventDefault(); go(idx - 1); }
      if (e.key === "p" || e.key === "P") togglePresenter();
      if (e.key === "s" || e.key === "S") toggleScriptOnly();
    });

    renderStop();
  </script>
</body>
</html>
