    const $plabel = document.getElementById("progress-label");

    function esc(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderList() {
      $list.innerHTML = STOPS.map((s, i) =>
        `<li><button type="button" data-i="${i}" class="${i === idx ? "current" : ""}">${esc(s.title)}</button></li>`
      ).join("");
      $list.querySelectorAll("button").forEach((b) => {
        b.addEventListener("click", () => go(+b.dataset.i));
      });
    }

    function renderStop() {
      const s = STOPS[idx];
      const docTags = (s.docs || []).map((d) => `<span class="tag doc">${esc(d)}</span>`).join("");
      const statusTag = s.status
        ? `<span class="tag ${s.status}">${s.status === "live" ? "● LIVE" : "◌ PROPOSED"}</span>`
        : "";
      const refBlock = s.ref
        ? `<div class="${scriptOnly ? "hidden" : ""}"><div class="ref-head"><span>Reference card</span><span>screen-share this</span></div><pre><code>${esc(s.ref)}</code></pre></div>`
        : "";

      $main.innerHTML = `
        <article class="card">
          <h2>${esc(s.title)}</h2>
          <div class="sub">Read aloud while recording · advance when done</div>
          <div class="tags">
            ${s.time ? `<span class="tag time">~${esc(s.time)}</span>` : ""}
            ${statusTag}
            ${docTags}
          </div>
          ${s.record ? `<div class="record-hint"><strong>Recording:</strong> ${esc(s.record)}</div>` : ""}
          <div class="script-box">
            <div class="label">Script — read this</div>
            <div class="script-text">${esc(s.script)}</div>
          </div>
          ${s.takeaway ? `<div class="takeaway"><strong>Takeaway:</strong> ${esc(s.takeaway)}</div>` : ""}
          ${refBlock}
          <div class="nav-row">
            <button type="button" id="nav-prev">← Previous</button>
            <button type="button" class="primary" id="nav-next">${idx < STOPS.length - 1 ? "Next →" : "Finish"}</button>
          </div>
        </article>`;

      document.getElementById("nav-prev").addEventListener("click", () => go(idx - 1));
      document.getElementById("nav-next").addEventListener("click", () => go(idx + 1));

      $fill.style.width = `${((idx + 1) / STOPS.length) * 100}%`;
      $plabel.textContent = `Stop ${idx + 1} of ${STOPS.length}`;
      renderList();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function go(i) {
      if (i < 0 || i >= STOPS.length) return;
      idx = i;
      renderStop();
    }

    function togglePresenter() {
      presenter = !presenter;
      document.body.classList.toggle("presenter", presenter);
      document.getElementById("btn-presenter").classList.toggle("active", presenter);
    }

    function toggleScriptOnly() {
      scriptOnly = !scriptOnly;
      document.getElementById("btn-script-only").classList.toggle("active", scriptOnly);
      renderStop();
    }

    document.getElementById("btn-prev").addEventListener("click", () => go(idx - 1));
    document.getElementById("btn-next").addEventListener("click", () => go(idx + 1));
    document.getElementById("btn-presenter").addEventListener("click", togglePresenter);
    document.getElementById("btn-script-only").addEventListener("click", toggleScriptOnly);

    document.addEventListener("keydown", (e) => {
      if (e.target.matches("input, textarea")) return;
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); go(idx + 1); }
      if (e.key === "ArrowLeft") { e.preventDefault(); go(idx - 1); }
      if (e.key === "p" || e.key === "P") togglePresenter();
      if (e.key === "s" || e.key === "S") toggleScriptOnly();
    });

    renderStop();
  </script>
</body>
</html>
